booking:
  property: Stock Profile Dev Update

spring:
  application:
    name: stock-microservice
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 0

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.uuid}